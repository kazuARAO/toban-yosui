name: predict-daily

# 毎日 5:30 JST (= 20:30 UTC) に予測を実行。
# 農家が早朝 (5-6 時) の田んぼ見回り・配水手配判断時に、当日の予測が
# 既に揃っていることを優先。前日の土地改良区貯水率 + 最新 kawabou + 気象庁予報で計算。
on:
  schedule:
    - cron: "30 20 * * *"
  workflow_dispatch:

concurrency:
  group: predict-daily
  cancel-in-progress: false

jobs:
  predict:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: scrapers
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      SCRAPER_USER_AGENT: "toban-yosui-watcher/0.1 (+https://github.com/kazuARAO/toban-yosui)"
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "scrapers/uv.lock"
      - run: uv sync --frozen
      - name: Fetch JMA weekly forecast
        run: uv run python -m toban_scraper.jma_forecast
      - name: Run prediction (deterministic + 3 LLMs)
        run: uv run python -m toban_scraper.predict
      - name: Evaluate past predictions vs actuals
        run: uv run python -m toban_scraper.predict_accuracy
