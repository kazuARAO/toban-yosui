name: scrape-weather

# 気象庁アメダスのデータを取得。今日 + 前日の 2 日分を毎回上書き保存する。
# - 朝 10:00 JST (1:00 UTC) : 前日分の確定値
# - 夕方 18:00 JST (9:00 UTC) : 当日進行中の集計（夕方時点の雨を当日反映）
on:
  schedule:
    - cron: "0 1 * * *"
    - cron: "0 9 * * *"
  workflow_dispatch:

concurrency:
  group: scrape-weather
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: scrapers
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SCRAPER_USER_AGENT: "toban-yosui-watcher/0.1 (+https://github.com/kazuARAO/toban-yosui)"
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "scrapers/uv.lock"
      - run: uv sync --frozen
      - run: uv run python -m toban_scraper.weather
