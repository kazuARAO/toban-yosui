name: scrape-weather

# 気象庁アメダスの 10 分データを取得。kawabou と同じ 30 分間隔で同期。
# 1 回の取得で現在 + 前の 3 時間スロット (計 ~6 時間分の 10 分値) を upsert。
on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

concurrency:
  group: scrape-weather
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: scrapers
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SCRAPER_USER_AGENT: "toban-yosui-watcher/0.1 (+https://github.com/kazuARAO/toban-yosui)"
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "scrapers/uv.lock"
      - run: uv sync --frozen
      - run: uv run python -m toban_scraper.weather
